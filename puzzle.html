<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>'Ismeretlen' kódgenerátor</title>
    <link rel="stylesheet" href="src/tools/puzzle-generator/PuzzleGenerator.css">
    <!-- A PROFIK EZT HASZNÁLJÁK: html-to-image, ami támogatja a CSS szűrőket -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="pg-controls" id="controls-panel">
            <h1>'Ismeretlen' kódgenerátor</h1>
            
            <div class="pg-tabs">
                <button class="pg-tab-btn active" data-tab="basic">Alap</button>
                <button class="pg-tab-btn" data-tab="cyan">Türkiz</button>
                <button class="pg-tab-btn" data-tab="dim">Szürke</button>
                <button class="pg-tab-btn" data-tab="yellow">Sárga</button>
                <button class="pg-tab-btn" data-tab="purple">Lila</button>
                <button class="pg-tab-btn" data-tab="green">Zöld</button>
            </div>

            <!-- ALAP BEÁLLÍTÁSOK -->
            <div class="pg-tab-content active" id="tab-basic">
                <div class="pg-control-group">
                    <label>Sűrűség (sorok): <span id="density-val">70</span></label>
                    <input type="range" id="density" min="10" max="200" value="70">
                </div>
                <div class="pg-control-group">
                    <label>Oszlopok száma: <span id="columns-val">3</span></label>
                    <input type="range" id="columns" min="1" max="5" value="3">
                </div>
                <div class="pg-control-group">
                    <label>Oszlopköz (px): <span id="columnGap-val">10</span></label>
                    <input type="range" id="columnGap" min="0" max="100" value="10">
                </div>
                <div class="pg-control-group">
                    <label>Blokkok száma: <span id="blocksPerColumn-val">5</span></label>
                    <input type="range" id="blocksPerColumn" min="1" max="20" value="5">
                </div>
                <div class="pg-control-group">
                    <label>Blokkköz (px): <span id="blockGap-val">20</span></label>
                    <input type="range" id="blockGap" min="0" max="100" value="20">
                </div>
                <div class="pg-control-group">
                    <label>Globális Betűméret: <span id="fontSize-val">14</span>px</label>
                    <input type="range" id="fontSize" min="6" max="30" value="14">
                </div>
                <div class="pg-control-group">
                    <label>Sortávolság: <span id="lineHeight-val">1.6</span></label>
                    <input type="range" id="lineHeight" min="0.5" max="3.0" step="0.1" value="1.6">
                </div>
                <div class="pg-control-group">
                    <label>Scanline intenzitás: <span id="scanlineOpacity-val">0.2</span></label>
                    <input type="range" id="scanlineOpacity" min="0" max="1" step="0.1" value="0.2">
                </div>
                <div class="pg-control-group">
                    <label>Háttérszín:</label>
                    <input type="color" id="bgColor" value="#010102">
                </div>
            </div>

            <!-- TÜRKIZ -->
            <div class="pg-tab-content" id="tab-cyan">
                <div class="pg-control-group">
                    <label>Türkiz színe:</label>
                    <input type="color" id="c-cyan" value="#00f2ff">
                </div>
                <div class="pg-control-group">
                    <label>Türkiz gyakorisága: <span id="p-cyan-pct">0</span>%</label>
                    <input type="range" id="p-cyan" min="0" max="100" value="17">
                </div>
                <div class="pg-control-group">
                    <label>Ragyogás: <span id="g-cyan-val">10</span></label>
                    <input type="range" id="g-cyan" min="0" max="30" value="10">
                </div>
                <div class="pg-control-group">
                    <label>Méret korrekció: <span id="s-cyan-val">-1</span>px</label>
                    <input type="range" id="s-cyan" min="-5" max="5" value="-1">
                </div>
                <div class="pg-control-group">
                    <label>Átlátszóság: <span id="o-cyan-val">0.9</span></label>
                    <input type="range" id="o-cyan" min="0" max="1" step="0.1" value="0.9">
                </div>
            </div>

            <!-- SZÜRKE -->
            <div class="pg-tab-content" id="tab-dim">
                <div class="pg-control-group">
                    <label>Szürke színe:</label>
                    <input type="color" id="c-dim" value="#444444">
                </div>
                <div class="pg-control-group">
                    <label>Szürke gyakorisága: <span id="p-dim-pct">0</span>%</label>
                    <input type="range" id="p-dim" min="0" max="100" value="100">
                </div>
                <div class="pg-control-group">
                    <label>Ragyogás: <span id="g-dim-val">0</span></label>
                    <input type="range" id="g-dim" min="0" max="30" value="0">
                </div>
                <div class="pg-control-group">
                    <label>Méret korrekció: <span id="s-dim-val">-1</span>px</label>
                    <input type="range" id="s-dim" min="-5" max="5" value="-1">
                </div>
                <div class="pg-control-group">
                    <label>Átlátszóság: <span id="o-dim-val">1</span></label>
                    <input type="range" id="o-dim" min="0" max="1" step="0.1" value="1">
                </div>
            </div>

            <!-- SÁRGA -->
            <div class="pg-tab-content" id="tab-yellow">
                <div class="pg-control-group">
                    <label>Sárga színe:</label>
                    <input type="color" id="c-yellow" value="#ffdf00">
                </div>
                <div class="pg-control-group">
                    <label>Sárga gyakorisága: <span id="p-yellow-pct">0</span>%</label>
                    <input type="range" id="p-yellow" min="0" max="100" value="10">
                </div>
                <div class="pg-control-group">
                    <label>Ragyogás: <span id="g-yellow-val">10</span></label>
                    <input type="range" id="g-yellow" min="0" max="30" value="10">
                </div>
                <div class="pg-control-group">
                    <label>Átlátszóság: <span id="o-yellow-val">0.6</span></label>
                    <input type="range" id="o-yellow" min="0" max="1" step="0.1" value="0.6">
                </div>
            </div>

            <!-- LILA -->
            <div class="pg-tab-content" id="tab-purple">
                <div class="pg-control-group">
                    <label>Lila színe:</label>
                    <input type="color" id="c-purple" value="#bd00ff">
                </div>
                <div class="pg-control-group">
                    <label>Lila gyakorisága: <span id="p-purple-pct">0</span>%</label>
                    <input type="range" id="p-purple" min="0" max="100" value="57">
                </div>
                <div class="pg-control-group">
                    <label>Ragyogás: <span id="g-purple-val">10</span></label>
                    <input type="range" id="g-purple" min="0" max="30" value="10">
                </div>
                <div class="pg-control-group">
                    <label>Átlátszóság: <span id="o-purple-val">0.8</span></label>
                    <input type="range" id="o-purple" min="0" max="1" step="0.1" value="0.8">
                </div>
            </div>

            <!-- ZÖLD -->
            <div class="pg-tab-content" id="tab-green">
                <div class="pg-control-group">
                    <label>Zöld színe:</label>
                    <input type="color" id="c-green" value="#39ff14">
                </div>
                <div class="pg-control-group">
                    <label>Zöld gyakorisága: <span id="p-green-pct">0</span>%</label>
                    <input type="range" id="p-green" min="0" max="100" value="19">
                </div>
                <div class="pg-control-group">
                    <label>Ragyogás: <span id="g-green-val">10</span></label>
                    <input type="range" id="g-green" min="0" max="30" value="10">
                </div>
                <div class="pg-control-group">
                    <label>Átlátszóság: <span id="o-green-val">0.5</span></label>
                    <input type="range" id="o-green" min="0" max="1" step="0.1" value="0.5">
                </div>
            </div>

            <div class="pg-actions">
                <button id="regenerate">Újragenerálás</button>
                <button id="save-image">Kép mentése</button>
            </div>
            <div class="pg-actions" style="margin-top: 8px;">
                <button id="save-config" style="font-size: 0.6rem;">Mentés (.json)</button>
                <button id="load-config" style="font-size: 0.6rem;">Betöltés (.json)</button>
            </div>
            <input type="file" id="config-file" style="display: none;" accept=".json">
        </div>

        <div class="pg-scanlines"></div>
        <div class="pg-canvas" id="capture-area">
            <div id="code-content" class="pg-code-grid"></div>
        </div>
    </div>

    <script src="src/tools/puzzle-generator/PuzzleGenerator.js"></script>
</body>
</html>
